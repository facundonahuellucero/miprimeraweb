<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Wireframe</title>
    <style>
        /* Estilos generales para centrar el contenido */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        /* El contenedor principal (el recuadro exterior) */
        .main-container {
            border: 5px solid black;
            padding: 40px;
            background-color: white;
            width: 400px;
        }

        /* El encabezado LOGIN.HTML */
        .header-box {
            border: 5px solid black;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 30px;
        }

        /* El recuadro del formulario */
        .form-container {
            border: 5px solid black;
            padding: 20px;
            position: relative;
        }

        .form-title {
            text-decoration: underline;
            font-weight: bold;
            display: block;
            margin-bottom: 25px;
        }

        /* Filas de los campos */
        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .label-text {
            font-weight: bold;
            margin-right: 10px;
            min-width: 80px;
        }

        /* Estilo de los cuadros de entrada y botón */
        .box-input {
            border: 4px solid black;
            height: 25px;
            width: 120px;
            background: white;
        }

        /* El botón "enviar" tiene un ancho diferente en la imagen */
        .submit-btn {
            width: 150px;
        }

    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-box">
            LOGIN.HTML
        </div>

        <div class="form-container">
            <span class="form-title">Formulario</span>

            <div class="input-group">
                <span class="label-text">user:</span>
                <div class="box-input"></div>
            </div>

            <div class="input-group">
                <span class="label-text">password:</span>
                <div class="box-input" style="margin-left: -20px;"></div> 
                </div>

            <div class="input-group" style="margin-top: 30px;">
                <span class="label-text">enviar:</span>
                <div class="box-input submit-btn"></div>
            </div>
        </div>
    </div>

</body>
</html>
